name: chinna_smart_hub
description: Chinna Smart Hub - ESP32 Mother + ESP8266 Child Control
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  awesome_circular_chart: ^1.1.0
  cached_network_image: ^3.2.0
  cupertino_icons: ^1.0.2
  dotted_border: ^2.0.0+2
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  http: ^1.2.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  font_awesome_flutter: ^11.0.0
  get_it: ^7.6.0
  image_picker: ^0.8.9
  lottie: ^3.3.3
  provider: ^6.1.5
  sleek_circular_slider: ^2.0.1
  sliding_up_panel: ^2.0.0+1
  syncfusion_flutter_charts: ^33.1.47
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_lints: ^2.0.1

  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_img.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/favourite.png
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/images/weather/
    - assets/images/settings/
    - assets/icons/svg/
    - assets/Lottie/
    - assets/icons/menu_icons/
    - assets/images/movies/

  fonts:
    - family: "Noto Sans"
      fonts:
        - asset: "assets/fonts/NotoSans-Bold.ttf"
          style: "normal"
        - asset: "assets/fonts/NotoSans-Regular.ttf"
          style: "normal"
    - family: "Poppins"
      fonts:
        - asset: "assets/fonts/Poppins-700.ttf"
          style: "normal"
          weight: 700
    - family: ABeeZee
      fonts:
        - asset: assets/fonts/ABeeZee-Italic.ttf
          style: italic
        - asset: assets/fonts/ABeeZee-Regular.ttf
          style: normal
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lexend-ExtraLight.ttf
          weight: 200
